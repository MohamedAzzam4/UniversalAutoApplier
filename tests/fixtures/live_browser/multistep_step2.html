<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Multi-step application - Step 2</title></head>
<body data-submitted="false">
  <main>
    <h1>Step 2: Additional Information</h1>
    <form onsubmit="document.body.dataset.submitted='true'; return false;">
      <label for="linkedin">LinkedIn URL</label>
      <input id="linkedin" name="linkedin" type="url">

      <fieldset>
        <legend>Do you have experience with Kubernetes?</legend>
        <label><input type="radio" name="k8s_exp" value="Yes" required> Yes</label>
        <label><input type="radio" name="k8s_exp" value="No"> No</label>
      </fieldset>

      <label for="github_url">GitHub URL</label>
      <input id="github_url" name="github_url" type="url">

      <button type="submit">Submit application</button>
    </form>
  </main>
</body>
</html>
