<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Submit with login required</title></head>
<body data-submitted="false">
  <main>
    <h1>Application Form (login required)</h1>
    <form id="apply-form" onsubmit="document.body.dataset.submitted='true'; return false;">
      <label for="first_name">First name</label>
      <input id="first_name" name="first_name" required>

      <label for="email">Email address</label>
      <input id="email" name="email" type="email" required>

      <button type="submit" id="submit-btn">Submit application</button>
    </form>
    <div id="login-dialog" role="dialog" style="display:none;">
      <h3>Please sign in to continue</h3>
      <input type="password" placeholder="Password" />
      <button>Sign in</button>
    </div>
  </main>
  <script>
    document.getElementById('apply-form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.body.dataset.submitted = 'false';
      // Show a login dialog after submit click.
      document.getElementById('login-dialog').style.display = 'block';
    });
  </script>
</body>
</html>
