<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Submit with ambiguous controls</title></head>
<body data-submitted="false">
  <main>
    <h1>Application Form (ambiguous submit)</h1>
    <form id="apply-form" onsubmit="document.body.dataset.submitted='true'; return false;">
      <label for="first_name">First name</label>
      <input id="first_name" name="first_name" required>

      <label for="email">Email address</label>
      <input id="email" name="email" type="email" required>

      <!-- Two submit buttons — ambiguous. -->
      <button type="submit" id="submit-btn-1">Submit application</button>
      <button type="submit" id="submit-btn-2">Send application</button>
    </form>
  </main>
</body>
</html>
