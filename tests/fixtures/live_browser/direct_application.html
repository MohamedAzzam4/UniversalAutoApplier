<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Direct application</title></head>
<body data-submitted="false">
  <main>
    <h1>Application form</h1>
    <form onsubmit="document.body.dataset.submitted='true'; return false;">
      <label for="salutation">Salutation *</label>
      <select id="salutation" name="salutation" required style="display:none">
        <option value="">Please choose</option>
        <option value="mr">Mr.</option>
        <option value="ms">Ms.</option>
      </select>
      <div id="salutation_chosen" role="combobox">
        Please choose
        <input class="chosen-search-input" aria-label="Search options">
      </div>
      <label for="first_name">First name</label>
      <input id="first_name" name="first_name" required>
      <label for="last_name">Last name</label>
      <input id="last_name" name="last_name" required>
      <label for="email">Email address</label>
      <input id="email" name="email" type="email" required>
      <label for="phone">Phone number</label>
      <input id="phone" name="phone" type="tel" required>
      <label for="cv">Resume / CV</label>
      <input id="cv" name="resume" type="file" required>
      <label for="cover">Cover letter</label>
      <input id="cover" name="cover_letter" type="file" required>
      <fieldset>
        <legend>Will you now or in the future require sponsorship?</legend>
        <label><input type="radio" name="sponsorship" value="Yes" required> Yes</label>
        <label><input type="radio" name="sponsorship" value="No"> No</label>
      </fieldset>
      <button type="submit">Submit application</button>
    </form>
  </main>
</body>
</html>
