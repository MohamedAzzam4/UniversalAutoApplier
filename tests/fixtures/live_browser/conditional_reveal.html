<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional reveal re-extraction form</title></head>
<body data-submitted="false">
  <main>
    <h1>Conditional Reveal Form</h1>
    <form onsubmit="document.body.dataset.submitted='true'; return false;">
      <label for="first_name">First name</label>
      <input id="first_name" name="first_name" required>

      <label for="email">Email address</label>
      <input id="email" name="email" type="email" required>

      <!-- Radio group: when "Yes" is selected, a conditional text field
           is revealed BELOW the radio group. This changes the extraction
           order on re-observation. The radio group's token must remain
           stable. -->
      <fieldset>
        <legend>Do you have experience with Docker?</legend>
        <label><input type="radio" name="docker_exp" value="Yes" required> Yes</label>
        <label><input type="radio" name="docker_exp" value="No"> No</label>
      </fieldset>

      <div id="conditional-container" style="display:none;">
        <label for="docker_years">How many years of Docker experience?</label>
        <input id="docker_years" name="docker_years" type="number" required>
      </div>

      <button type="submit">Submit application</button>
    </form>
  </main>
  <script>
    document.querySelectorAll('input[name="docker_exp"]').forEach(function (radio) {
      radio.addEventListener('change', function () {
        var container = document.getElementById('conditional-container');
        if (this.value === 'Yes') {
          container.style.display = 'block';
          document.getElementById('docker_years').setAttribute('required', 'required');
        } else {
          container.style.display = 'none';
          document.getElementById('docker_years').removeAttribute('required');
        }
      });
    });
  </script>
</body>
</html>
