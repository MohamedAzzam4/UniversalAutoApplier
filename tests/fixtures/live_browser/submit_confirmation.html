<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Submit confirmation fixture</title></head>
<body data-submitted="false">
  <main>
    <h1>Application Form</h1>
    <form id="apply-form" onsubmit="document.body.dataset.submitted='true'; return false;">
      <label for="first_name">First name</label>
      <input id="first_name" name="first_name" required>

      <label for="email">Email address</label>
      <input id="email" name="email" type="email" required>

      <button type="submit" id="submit-btn">Submit application</button>
    </form>
    <div id="confirmation" style="display:none;">
      <h2>Thank you for your application!</h2>
      <p>Your application has been received. Reference: APP-12345</p>
    </div>
  </main>
  <script>
    document.getElementById('apply-form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.body.dataset.submitted = 'true';
      document.getElementById('apply-form').style.display = 'none';
      document.getElementById('confirmation').style.display = 'block';
    });
  </script>
</body>
</html>
