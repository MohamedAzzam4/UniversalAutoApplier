<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Submit with confirmation in new tab</title></head>
<body data-submitted="false">
  <main>
    <h1>Application Form (new tab confirmation)</h1>
    <form id="apply-form" onsubmit="document.body.dataset.submitted='true'; return false;">
      <label for="first_name">First name</label>
      <input id="first_name" name="first_name" required>

      <label for="email">Email address</label>
      <input id="email" name="email" type="email" required>

      <!-- The form targets _blank so the confirmation opens in a new tab. -->
      <button type="submit" id="submit-btn" formtarget="_blank">Submit application</button>
    </form>
  </main>
  <script>
    document.getElementById('apply-form').addEventListener('submit', function(e) {
      // Don't prevent default — let the form submit to a new tab.
      // But set data-submitted on the current page.
      document.body.dataset.submitted = 'true';
    });
  </script>
</body>
</html>
