<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>iframe form fixture</title></head>
<body data-submitted="false">
  <main>
    <h1>Main Page With iframe</h1>
    <!-- The main page has a text field. The iframe has a different text
         field with the SAME id and name. The two must NOT collide: the
         iframe field's token is derived from the iframe URL, not the
         top-frame URL. -->
    <label for="first_name">First name</label>
    <input id="first_name" name="first_name" required>

    <label for="email">Email address</label>
    <input id="email" name="email" type="email" required>

    <iframe src="iframe_inner.html" id="apply-iframe" width="100%" height="300"></iframe>

    <button type="submit" form="main-form">Submit application</button>
  </main>
</body>
</html>
