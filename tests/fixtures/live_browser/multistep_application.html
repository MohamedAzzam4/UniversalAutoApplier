<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Multi-step application - Step 1</title></head>
<body data-submitted="false">
  <main>
    <h1>Step 1: Personal Information</h1>
    <form id="step1" onsubmit="document.body.dataset.submitted='true'; return false;">
      <label for="first_name">First name</label>
      <input id="first_name" name="first_name" required>

      <label for="email">Email address</label>
      <input id="email" name="email" type="email" required>

      <fieldset>
        <legend>Do you have experience with Docker?</legend>
        <label><input type="radio" name="docker_exp" value="Yes" required> Yes</label>
        <label><input type="radio" name="docker_exp" value="No"> No</label>
      </fieldset>

      <a href="multistep_step2.html" id="next-btn" class="uaa-btn">Next</a>
      <button type="submit" id="submit-btn" style="display:none">Submit application</button>
    </form>
  </main>
</body>
</html>
