<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Multi-step application</title></head>
<body data-submitted="false">
  <main>
    <h1>Step 1: Personal Information</h1>
    <form id="step1" onsubmit="document.body.dataset.submitted='true'; return false;">
      <label for="first_name">First name</label>
      <input id="first_name" name="first_name" required>

      <label for="email">Email address</label>
      <input id="email" name="email" type="email" required>

      <fieldset>
        <legend>Do you have experience with Docker?</legend>
        <label><input type="radio" name="docker_exp" value="Yes" required> Yes</label>
        <label><input type="radio" name="docker_exp" value="No"> No</label>
      </fieldset>

      <button type="button" id="next-btn">Next</button>
      <button type="submit" id="submit-btn" style="display:none">Submit application</button>
    </form>
  </main>
  <script>
    document.getElementById('next-btn').addEventListener('click', function() {
      var step1 = document.getElementById('step1');
      var dockerChecked = document.querySelector('input[name="docker_exp"]:checked');
      if (dockerChecked && dockerChecked.value === 'Yes') {
        var condField = document.createElement('fieldset');
        condField.id = 'conditional-field';
        condField.innerHTML = '<legend>How many years of Docker experience?</legend>' +
          '<input id="docker_years" name="docker_years" type="number" required>';
        step1.insertBefore(condField, document.getElementById('next-btn'));
      }
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('submit-btn').style.display = 'block';
    });
  </script>
</body>
</html>
