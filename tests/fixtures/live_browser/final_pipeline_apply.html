<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Apply - Software Engineer</title></head>
<body data-submitted="false">
  <main>
    <h1>Application Form</h1>
    <form id="apply-form">
      <label for="first_name">First name *</label>
      <input id="first_name" name="first_name" required>

      <label for="last_name">Last name *</label>
      <input id="last_name" name="last_name" required>

      <label for="email">Email *</label>
      <input id="email" name="email" type="email" required>

      <label for="phone">Phone *</label>
      <input id="phone" name="phone" type="tel" required>

      <label for="linkedin_url">LinkedIn Profile URL *</label>
      <input id="linkedin_url" name="linkedin_url" type="url" required>

      <label for="salary">Desired Salary</label>
      <input id="salary" name="salary" type="text">

      <label for="cv_upload">Resume/CV</label>
      <input id="cv_upload" name="cv_upload" type="file" accept=".pdf">

      <label for="cover_letter">Cover letter</label>
      <input id="cover_letter" name="cover_letter" type="file" accept=".pdf">

      <label for="additional_notes">Additional notes (optional)</label>
      <textarea id="additional_notes" name="additional_notes"></textarea>

      <button type="submit" id="submit-btn">Submit application</button>
    </form>
    <div id="confirmation" style="display:none;">
      <h2>Thank you for your application!</h2>
      <p>Your application has been received.</p>
    </div>
  </main>
  <script>
    document.getElementById('apply-form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.body.dataset.submitted = 'true';
      document.getElementById('apply-form').style.display = 'none';
      document.getElementById('confirmation').style.display = 'block';
      fetch('/click', { method: 'POST' });
    });
  </script>
</body>
</html>
