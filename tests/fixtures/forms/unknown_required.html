<!doctype html>
<html lang="en">
<head>
    <title>Unknown Required Fields Form</title>
</head>
<body>
    <h1>Application Form</h1>
    <form action="/apply" method="post">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="gpa">What was your college GPA?</label>
        <input type="text" id="gpa" name="gpa" required placeholder="e.g. 3.8">

        <label for="salary">Expected salary range</label>
        <input type="text" id="salary" name="salary" required placeholder="e.g. 60000-80000">

        <label for="referral">Were you referred by a current employee?</label>
        <input type="text" id="referral" name="referral" required placeholder="Employee name or N/A">

        <button type="submit" id="submit-btn">Submit</button>
    </form>
</body>
</html>
