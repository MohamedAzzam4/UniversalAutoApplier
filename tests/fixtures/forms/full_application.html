<!doctype html>
<html lang="en">
<head>
    <title>Full Application Form</title>
</head>
<body>
    <h1>Job Application</h1>
    <form action="/apply" method="post">
        <label for="first_name">First name</label>
        <input type="text" id="first_name" name="first_name" required placeholder="John">

        <label for="last_name">Last name</label>
        <input type="text" id="last_name" name="last_name" required placeholder="Doe">

        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="john@example.com">

        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" placeholder="+49 ...">

        <label for="linkedin">LinkedIn URL</label>
        <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/...">

        <label for="cover_letter">Why are you interested in this role?</label>
        <textarea id="cover_letter" name="cover_letter" required rows="5" placeholder="Tell us why..."></textarea>

        <label for="resume">Upload resume</label>
        <input type="file" id="resume" name="resume" accept=".pdf" required>

        <label for="cover_pdf">Upload cover letter</label>
        <input type="file" id="cover_pdf" name="cover_pdf" accept=".pdf">

        <button type="button" id="next-btn">Next</button>
        <button type="submit" id="submit-btn">Submit application</button>
    </form>
</body>
</html>
