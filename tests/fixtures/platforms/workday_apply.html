<!doctype html>
<html lang="en">
<head>
    <title>Workday - Apply - Data Analyst</title>
</head>
<body>
    <h1>Apply to Data Analyst at GlobalCorp</h1>
    <form action="/myworkdayjobs.com/globalcorp/submit" method="post" id="wd-apply-form">
        <label for="first_name">First name</label>
        <input type="text" id="first_name" name="first_name" required>

        <label for="last_name">Last name</label>
        <input type="text" id="last_name" name="last_name" required>

        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone">

        <label for="resume">Resume</label>
        <input type="file" id="resume" name="resume" accept=".pdf" required>

        <label for="cover_letter">Cover letter</label>
        <input type="file" id="cover_letter" name="cover_letter" accept=".pdf">

        <label for="country">Country</label>
        <select id="country" name="country" required>
            <option value="">Select a country</option>
            <option value="de">Germany</option>
            <option value="us">United States</option>
        </select>

        <button type="submit" id="submit-app">Submit application</button>
    </form>
</body>
</html>
