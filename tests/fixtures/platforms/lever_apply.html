<!doctype html>
<html lang="en">
<head>
    <title>Lever - Apply - Product Manager</title>
</head>
<body>
    <h1>Apply to Product Manager at TechCo</h1>
    <form action="/jobs.lever.co/techco/submit" method="post" id="lever-apply-form">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone">

        <label for="resume">Resume</label>
        <input type="file" id="resume" name="resume" accept=".pdf" required>

        <label for="cover_letter">Cover letter</label>
        <input type="file" id="cover_letter" name="cover_letter" accept=".pdf">

        <label for="linkedin">LinkedIn URL</label>
        <input type="url" id="linkedin" name="linkedin">

        <label for="portfolio">Portfolio URL</label>
        <input type="url" id="portfolio" name="portfolio">

        <button type="submit" id="submit-app">Submit application</button>
    </form>
</body>
</html>
