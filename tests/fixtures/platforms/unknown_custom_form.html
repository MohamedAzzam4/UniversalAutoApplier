<!doctype html>
<html lang="en">
<head>
    <title>Custom Application Form</title>
</head>
<body>
    <h1>Apply to Unknown Company</h1>
    <form action="/custom/submit" method="post">
        <label for="fullname">Full name</label>
        <input type="text" id="fullname" name="fullname" required placeholder="Your full name">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">

        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="+49 ...">

        <label for="linkedin">LinkedIn URL</label>
        <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/...">

        <label for="resume">Upload resume</label>
        <input type="file" id="resume" name="resume" accept=".pdf">

        <button type="button" id="submit-form">Submit my application</button>
    </form>
</body>
</html>
