# Alembic configuration for UniversalAutoApplier.
#
# The migrations directory is relative to this file. The SQLAlchemy URL is
# injected at runtime by `universal_auto_applier.persistence.migrations` and
# by `migrations/env.py` when running `alembic` from the CLI.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
sqlalchemy.url = sqlite:///uaa.sqlite

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
